<VirtualHost *:80>
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    # Adicione aqui o seu domínio: <NOME_APP>.local
    ServerName nexobot.local
	# Defina aqui o caminho do seu projeto Laravel: /var/www/<NOME_APP>/laravel/public/
	DocumentRoot /var/www/nexobot/laravel/public/
    <Directory />
        Options FollowSymLinks
        AllowOverride None
    </Directory>
    <Directory /var/www/nexobot/laravel/public/>
		Require all granted
        AllowOverride all
        Order allow,deny
        allow from all
        RewriteEngine On
        RewriteOptions Inherit
    </Directory>
    BrowserMatch "MSIE [2-6]" \
                    nokeepalive ssl-unclean-shutdown \
                    downgrade-1.0 force-response-1.0
    BrowserMatch "MSIE [17-9]" ssl-unclean-shutdown

    LogLevel notice
    # Send apache logs to stdout and stderr
    CustomLog /proc/self/fd/1 common
    #ErrorLog /proc/self/fd/2
	ErrorLog /var/log/site-error.log
	#CustomLog /var/log/site-access.log 
</VirtualHost>
